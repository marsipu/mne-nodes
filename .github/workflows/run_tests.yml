name: CIs
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu, windows, macos ]
        python: [ '3.14' ]
        # Oldest supported python version
        include:
          - os: ubuntu
            python: '3.11'
    name: Run tests on ${{ matrix.os }} - ${{matrix.python}}
    runs-on: ${{ matrix.os }}-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      # Set up headless display for windows and linux
      - name: Setup headless display
        uses: pyvista/setup-headless-display-action@main
        with:
          qt: true
          pyvista: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Installation with dependencies
        # Test with PySide6 by default
        run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6
          python -m pip install -ve ".[test]"
      - name: Get testing version
        run: |
          mkdir -p mne/datasets
          curl --output-dir mne/datasets/ --remote-name https://raw.githubusercontent.com/mne-tools/mne-python/main/mne/datasets/config.py
          curl --remote-name https://raw.githubusercontent.com/mne-tools/mne-python/main/tools/get_testing_version.sh
          bash ./get_testing_version.sh
      - uses: actions/cache@v5
        with:
          key: ${{ env.TESTING_VERSION }}
          path: ~/mne_data
        name: 'Cache testing data'
      - name: 'Download testing dataset'
        run: |
          python -c 'import mne; mne.datasets.testing.data_path()'
      - name: Show system information
        run: mne sys_info
      - run: pytest
        name: Run Tests
